# keybridgeBT win-receiver configuration

# Bluetooth COM port to connect to the Mac sender.
# null = auto-detect (prefers outgoing ports over incoming ones).
#
# You need an OUTGOING Bluetooth COM port:
#   Control Panel → Hardware and Sound → Bluetooth Settings
#   → COM Ports tab → Add → Outgoing → select your Mac → OK
#
# To find your port number run:
#   py -m keybridgebt_win --list-ports
#
# Then set it here if auto-detect picks the wrong one:
#   com_port: "COM5"
com_port: null

max_key_events_per_second: 20
log_level: INFO
