# keybridgeBT win-receiver configuration

# Mac's IP address — null = prompt on startup.
# Set this to avoid the interactive prompt:
#   host: "192.168.1.10"
#
# Or pass it on the command line:
#   py -m keybridgebt_win --host 192.168.1.10
host: null

# TCP port must match mac-sender's listen_port
port: 9741

max_key_events_per_second: 20
log_level: INFO
